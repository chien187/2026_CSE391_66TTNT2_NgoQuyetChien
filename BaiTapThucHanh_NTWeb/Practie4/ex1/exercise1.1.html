<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ex1.1 - Quản lý điểm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <label for="name">Họ và tên:</label>
        <input type="text" id="name" name="name" placeholder="Họ tên sinh viên"><br><br>
        
        <label for="diem">Điểm:</label>
        <input type="number" id="diem" name="diem" min="0" max="10" step="0.1" placeholder="0-10"><br><br>
        
        <button id="addBtn">Thêm</button>
    </div>
    
    <br>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentBody">
            </tbody>
    </table>

    <div class="stats" style="margin-top: 15px;">
        Tổng số sinh viên: <span id="totalStudents">0</span> | 
        Điểm trung bình: <span id="avgScore">0.0</span>
    </div>

    <script src="1.1.js"></script>
</body>
</html>
