<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ex1.2 - Bộ Lọc & Tìm Kiếm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <label for="name">Họ và tên:</label>
        <input type="text" id="name" placeholder="Họ tên sinh viên"><br><br>
        
        <label for="diem">Điểm:</label>
        <input type="number" id="diem" min="0" max="10" step="0.1" placeholder="0-10"><br><br>
        
        <button id="addBtn">Thêm sinh viên</button>
    </div>
    
    <hr style="margin: 20px 0;">

    <div style="margin-bottom: 15px; padding: 10px; background-color: #f8f9fa; border: 1px solid #ddd;">
        <label for="searchInput"><strong>Tìm kiếm:</strong></label>
        <input type="text" id="searchInput" placeholder="Nhập tên cần tìm..." style="margin-right: 20px;">

        <label for="filterSelect"><strong>Xếp loại:</strong></label>
        <select id="filterSelect">
            <option value="All">Tất cả</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="sortDiemBtn" style="cursor: pointer; color: blue;">Điểm <span id="sortIcon"></span></th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentBody">
            </tbody>
    </table>

    <div class="stats" style="margin-top: 15px;">
        Tổng số sinh viên (cả lớp): <span id="totalStudents">0</span> | 
        Điểm trung bình: <span id="avgScore">0.0</span>
    </div>

    <script src="1.2.js"></script>
</body>
</html>
